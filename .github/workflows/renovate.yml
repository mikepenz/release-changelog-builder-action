name: Renovate
on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3am UTC
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: renovatebot/github-action@68a3ea99af6ad249940b5a9fdf44fc6d7f14378b  # v46.1.6
        with:
          configurationFile: renovate.json
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          RENOVATE_PLATFORM: github
          RENOVATE_USERNAME: mikepenz
          RENOVATE_GIT_AUTHOR: "Mike Penz <opensource-bot@mikepenz.dev>"
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: optional
